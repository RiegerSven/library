project:
  type: book
  output-dir: _book

metadata-files: 
  - common.yml

book:
  title: Coding and Teaching Library
  author:
  - name: '[Sven Rieger](<https://riegersven.github.io/>)'
    affiliation:
    - name: University of Tübingen
      city: Tübingen
      url: https://uni-tuebingen.de/
    email: sven.rieger@uni-tuebingen.de
    email-obfuscation: javascript
    orcid: 0000-0002-0339-0695
  reader-mode: true
  repo-url: https://github.com/RiegerSven/library
  repo-actions: [edit, issue, source]
  page-footer:
    center: Copyright 2025
    left: This book is build with [Quarto](<https://www.quarto.org>).
  chapters:
  - href: index.qmd
    text: Preface
  - part: Software
    chapters:
    - href: software/road-to-reproducible-projects.qmd
    - href: software/choose-an-ide.qmd
      text: Choose an IDE (for R)
    - href: software/introduction-to-r.qmd
      text: Introduction to R
    - href: software/introduction-to-quarto.qmd
      text: A not so short introduction to Quarto
    - href: software/quarto-and-zotero.qmd
      text: Use Quarto with Zotero
    - href: software/setup-a-project-environment.qmd
      text: Setup a project environment
  - part: Example Data
    chapters:
    - href: example-data/data-hsb.qmd
      text: High School and Beyond
  - part: Working with Data
    chapters:
    - href: working-with-data/descriptive-statistics.qmd
      text: Descriptive Statistics
  - href: references.qmd
    text: References
format:
  html:
    theme: 
      light: litera
    mermaid: 
      theme: neutral
    embed-resources: false
    toc: true
    css:
    - styles.css
    - include/webex.css
    grid:
      sidebar-width: 250px
      body-width: 850px
      margin-width: 250px
      gutter-width: 2em
    include-after-body: include/webex.js

profile:
  default: development

