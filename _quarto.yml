project:
  type: default

bibliography: 
  - "github-library.bib"
  - "r-refs.bib"
csl: apa.csl

# code stuff
highlight-style: github
code-fold: false
code-line-numbers: true
code-annotations: below
code-copy: true
code-link: true

# links
link-external-icon: false
link-external-newwindow: true
link-citations: true

crossrefs-hover: true

format:
  html: default
  revealjs: default

execute: 
  freeze: false
  cache: false