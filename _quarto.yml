project:
  type: default

profile:
  default: book

bibliography: 
  - "github-library.bib"
  - "r-refs.bib"
csl: apa.csl

# code stuff
highlight-style: github
code-fold: false
code-line-numbers: true
code-annotations: below
code-copy: true
code-link: true

# links
link-external-icon: false
link-external-newwindow: true
link-citations: true

crossrefs-hover: true
fig-cap-location: top

execute: 
  freeze: false
  cache: false
  echo: true